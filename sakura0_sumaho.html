<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>染井野線 現在位置</title>

<style>
body { margin: 0; font-family: sans-serif; background: #eee; }
.container {
  width: 95%;
  max-width: 380px;
  margin: auto;
  background: #ddd;
  position: relative;
  padding-bottom: 100px; /* バスアイコン用余白 */
}
.header { display: flex; justify-content: space-between; padding: 8px 10px; font-size: 14px; }
.row { display: flex; align-items: center; height: 44px; position: relative; }
.stop { flex: 0 0 150px; padding-left: 8px; }
.line { flex: 1; height: 2px; background: black; position: relative; }
.gap-line { border-top: 2px dashed black; width: 100%; }
.overlay { position: absolute; top: 30px; left: 150px; right: 0; bottom: 0; pointer-events: none; }
.v { position: absolute; width: 3px; background: #a855f7; }
.bus { position: absolute; transform: translate(-50%, -50%); font-size: 20px; cursor: pointer; z-index: 10; }
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <div>染井野線 現在位置情報</div>
    <div id="time">現在時刻: --:--</div>
  </div>

  <div id="list"></div>

  <div class="overlay">
    <div class="v" style="left:20px; top:0; bottom:0;"></div>
    <div class="v" style="left:60px; top:0; bottom:0;"></div>
  </div>
</div>

<script>
// 停留所
const stops = [
  "白井駅","間野台小学校","消防署","三丁目","えのき公園",
  "染井野小学校","運動広場","販売センター","地区センター",
  "七井戸公園","吉見台公園","七丁目","染井野南"
];

const list = document.getElementById("list");
stops.forEach((name,i)=>{
  const row = document.createElement("div");
  row.className = "row";
  row.dataset.index = i;
  row.innerHTML = `<div class="stop">${name}</div><div class="line"></div>`;
  list.appendChild(row);
  if(name==="運動広場"){
    const gap = document.createElement("div");
    gap.className = "gap-line";
    list.appendChild(gap);
  }
});

// 時刻表示
function updateTime(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById("time").innerText = `現在時刻: ${h}:${m}:${s}`;
}
setInterval(updateTime,1000);
updateTime();

// バス情報
const busInfos = [
  { destination:"臼井駅", route:"00系統", display:"200-2番", via:"臼井駅～染井野南", number:"U501", delay:"定着" },
  { destination:"染井野南", route:"00系統", display:"200-1番", via:"臼井駅～染井野南", number:"U501", delay:"途中約1～2分遅れ" },
  { destination:"染井野南", route:"00系統 回送表示", display:"000-1番", via:"臼井駅～染井野南", number:"U501", delay:"定着" },
  { destination:"臼井駅", route:"00系統", display:"000-0番", via:"染井野循環", number:"U501", delay:"定着" }
];

// 簡略化のため、ここでは1便だけ例示
const busSchedules = [
  { schedule:[
      {stop:"臼井駅", time:6*60+19, arrow:"⬇️", left:212},
      {stop:"間野台小学校", time:6*60+21},
      {stop:"消防署", time:6*60+22},
      {stop:"販売センター", time:6*60+23},
      {stop:"地区センター", time:6*60+24, arrow:"⬆️", left:172},
      {stop:"運動広場", time:6*60+25},
      {stop:"染井野小学校", time:6*60+26},
      {stop:"えのき公園", time:6*60+27},
      {stop:"三丁目", time:6*60+28},
      {stop:"消防署", time:6*60+29},
      {stop:"間野台小学校", time:6*60+30},
      {stop:"臼井駅", time:6*60+32}
    ],
    info: busInfos[3], startOffset:3
  }
];

let buses = [];
const busEndTimes = new Map();

function getBusPosition(busObj){
  const schedule = busObj.schedule;
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;

  if(nowMin < schedule[0].time - (busObj.startOffset||0)) return null;

  for(let i=0;i<schedule.length-1;i++){
    const t1 = schedule[i].time;
    const t2 = schedule[i+1].time;
    if(nowMin >= t1 && nowMin < t2){
      const arrow = schedule[i].arrow || busObj.arrow || "⬆️";
      const left = schedule[i].left || busObj.left || 60;
      return { index:i, progress:(nowMin-t1)/(t2-t1), arrow, left };
    }
  }

  const lastStop = schedule[schedule.length-1];
  const arrow = lastStop.arrow || busObj.arrow || "⬆️";
  const left = lastStop.left || busObj.left || 60;

  if(!busEndTimes.has(busObj)){
    busEndTimes.set(busObj, now.getTime());
  }
  const elapsed = (now.getTime() - busEndTimes.get(busObj))/1000;
  if(elapsed > 20) return null;

  return { index: schedule.length-1, progress:0, arrow, left };
}

function updateBuses(){
  buses.forEach(b=>b.remove());
  buses=[];
  busSchedules.forEach(busObj=>{
    const pos = getBusPosition(busObj);
    if(!pos) return;

    const currentRow = document.querySelector(`.row[data-index="${pos.index}"]`);
    const nextRow = document.querySelector(`.row[data-index="${pos.index+1}"]`);
    const y1 = currentRow.getBoundingClientRect().top + window.scrollY;
    const y2 = nextRow ? nextRow.getBoundingClientRect().top + window.scrollY : y1;
    const y = y1 + (y2 - y1) * pos.progress;

    const bus = document.createElement("div");
    bus.className="bus";
    bus.innerHTML = pos.arrow;
    bus.style.left = pos.left+"px";
    bus.style.top = y+"px";

    bus.onclick = ()=>{ 
      const info = busObj.info;
      alert(`行先: ${info.destination}\n系統: ${info.route}\n行先表示: ${info.display}\n経由: ${info.via}\n運用番号: ${info.number}\n遅延予想: ${info.delay}`);
    };

    document.querySelector(".container").appendChild(bus);
    buses.push(bus);
  });
}

setInterval(updateBuses,1000);
updateBuses();
</script>
</body>
</html>
