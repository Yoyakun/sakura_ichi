.bus {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 10;

}

/* 👇 新しく追加 */
.bus img {

// --- ここまでで朝5時～夕方14時の全便対応 ---

let buses = [];
const busEndTimes = new Map();

function getBusPosition(busObj){
  const schedule = busObj.schedule;
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;

  if(nowMin < schedule[0].time - (busObj.startOffset || 0)) return null;

  const last = schedule[schedule.length-1];

  if(nowMin > last.time + 1) return null;

  if(nowMin >= last.time){
    const arrow = last.arrow || busObj.arrow || "⬆️";
    const left = last.left || busObj.left || 60;

    if(!busEndTimes.has(busObj)) busEndTimes.set(busObj, Date.now());
    const elapsed = (Date.now() - busEndTimes.get(busObj))/1000;
    if(elapsed > 20) return null;

    return { stop: last.stop, arrow, left };
  }

  for(let i=0;i<schedule.length-1;i++){
    const current = schedule[i];
    const next = schedule[i+1];

    if(nowMin >= current.time && nowMin < next.time){
      if(busEndTimes.has(busObj)) busEndTimes.delete(busObj);

      return {
  stop: current.stop,
  arrow: current.arrow || busObj.arrow || "⬇️",
  left: current.left || busObj.left || 212,
  icon: current.icon || busObj.info.icon   // ←追加
};
    }
  }

  return null;
}

function updateBuses(){
  buses.forEach(b=>b.remove());
  buses = [];

  busSchedules.forEach(busObj=>{
    const pos = getBusPosition(busObj);
    if(!pos) return;

    const y = stopPositions[pos.stop];
    if(y===undefined) return;

    const bus = document.createElement("div");
    bus.className="bus";
    const img = document.createElement("img");

// busInfosで設定した画像を使う
img.src = pos.icon || busObj.info.icon;


bus.appendChild(img);
    bus.style.left = pos.left+"px";
    bus.style.top = y+"px";

bus.onclick = ()=>{
  const info = busObj.info;

  const msg =
`行先: ${info.destination}
系統: ${info.route}
行先表示: ${info.display}
経由: ${info.via}
運用番号: ${info.number}
遅延予想: ${info.delay}

[運用表を見る]`;

  if(confirm(msg)){
    showDiagram(info.diagram);
  }
};

    document.querySelector(".container").appendChild(bus);
    buses.push(bus);
  });
}

setInterval(updateBuses,1000);
updateBuses();

function showDiagram(img){
  const box = document.getElementById("diagramBox");
  const image = document.getElementById("diagramImg");

  image.src = img;
  box.style.display = "block";
}

document.getElementById("diagramBox").onclick = function(){
  this.style.display = "none";
}
